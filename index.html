<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Finance Tracker</title>

    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <header class="navbar">
        <h1>Smart Finance Tracker</h1>
        <div class="nav-right">
            <input type="text" id="searchInput" placeholder="Search transaction..." />
            <button id="themeToggle">🌙</button>
        </div>
    </header>

    <section class="hero">
        <h2>Manage Your Money Smarter</h2>
        <p>
            Track your income and expenses with a modern dashboard
        </p>
    </section>

    <section class="stats-container">
        <div class="stat-card">
            <h3>Total Balance</h3>
            <p id="balance">₹0</p>
        </div>

        <div class="stat-card">
            <h3>Total Income</h3>
            <p id="income">₹0</p>
        </div>

        <div class="stat-card">
            <h3>Total Expense</h3>
            <p id="expense">₹0</p>
        </div>
    </section>

    <section class="form-section">
        <div class="form-card">
            <h2>Add Transaction</h2>

            <form id="financeForm">
                <input type="text" id="title" placeholder="Enter title" required />
                <input type="number" id="amount" placeholder="Enter amount" required />

                <select id="type">
                    <option value="income">
                        Income
                    </option>
                    <option value="expense">
                        Expense
                    </option>
                </select>

                <select id="category">
                    <option value="Food">
                        Food
                    </option>
                    <option value="Shopping">
                        Shopping
                    </option>
                    <option value="Travel">
                        Travel
                    </option>
                    <option value="Salary">
                        Salary
                    </option>
                    <option value="Entertainment">
                        Entertainment
                    </option>
                </select>

                <button type="submit">
                    Add Transaction
                </button>

            </form>

        </div>

    </section>

    <section class="filter-section">
        <button class="filter-btn active" data-filter="All">
            All
        </button>
        <button class="filter-btn" data-filter="income">
            Income
        </button>
        <button class="filter-btn" data-filter="expense">
            Expense
        </button>
        <button id="resetBtn">
            Reset All
        </button>
    </section>

    <section id="transactionContainer" class="transaction-container"></section>

    <script src="script.js"></script>

</body>

</html>
